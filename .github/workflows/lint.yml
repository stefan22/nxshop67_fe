name: Prettier linting

on:
  push:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Starts linting
        run: |
          echo "Starts linting"

      - name: Checkout
        uses: actions/checkout@v3

        with:
          node-version: '14'

      - name: npm install
        run: npm install

      - name: prettier
        run: npm run prettier:fix --write **/*.{js,jsx,ts,tsx}
       
